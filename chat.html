<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAD AI — ULTIMATE VOICE OMNI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        .gradient-main { background: linear-gradient(135deg, #059669 0%, #065f46 100%); }
        .msg-anim { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        #chat-window::-webkit-scrollbar { width: 5px; }
        #chat-window::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
        .recording { animation: pulse 1.5s infinite; background: #ef4444 !important; color: white !important; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <nav class="bg-white border-b-2 border-emerald-500 p-4 flex justify-between items-center shadow-lg z-20">
        <div class="flex items-center gap-3">
            <div class="text-emerald-600 font-black text-2xl">🎙️</div>
            <span class="text-2xl font-black text-slate-900 tracking-tighter">CHAD <span class="text-emerald-600">AI</span></span>
        </div>
        <div class="flex flex-col items-end">
            <span class="text-[9px] font-bold text-emerald-600 uppercase tracking-widest bg-emerald-50 px-2 py-1 rounded">Voice & Text Active</span>
            <span class="text-[8px] text-slate-400">All Topics Loaded</span>
        </div>
    </nav>

    <main id="chat-window" class="flex-1 overflow-y-auto p-4 md:p-12 space-y-6 flex flex-col bg-slate-50">
        <div class="flex gap-4 msg-anim">
            <div class="w-12 h-12 gradient-main rounded-2xl flex items-center justify-center text-white font-black shadow-xl shrink-0 border-2 border-white">C</div>
            <div class="bg-white p-6 rounded-3xl rounded-tl-none shadow-sm border border-slate-200 max-w-[85%] text-slate-700 leading-relaxed italic">
                Я восстановил весь свой словарь! Можешь <b>писать</b> или <b>говорить</b> через микрофон. Спрашивай о чем угодно.
            </div>
        </div>
    </main>

    <footer class="p-6 bg-white border-t border-slate-200 shadow-xl">
        <div class="max-w-6xl mx-auto flex gap-4">
            <button id="voice-btn" class="bg-slate-100 text-slate-500 p-5 rounded-2xl transition-all hover:bg-slate-200 active:scale-90 shadow-inner border border-slate-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-20a3 3 0 00-3 3v8a3 3 0 006 0V5a3 3 0 00-3-3z" />
                </svg>
            </button>
            <input 
                type="text" 
                id="user-input" 
                placeholder="Спроси о чем угодно..." 
                class="flex-1 bg-slate-100 border-2 border-transparent rounded-2xl px-7 py-5 text-xl outline-none focus:border-emerald-500 focus:bg-white transition-all font-semibold"
                autocomplete="off"
            >
            <button id="send-btn" class="gradient-main text-white px-10 py-5 rounded-2xl font-black hover:brightness-110 active:scale-95 transition-all shadow-xl uppercase">
                SEND
            </button>
        </div>
    </footer>

    <script>
        const input = document.getElementById('user-input');
        const btn = document.getElementById('send-btn');
        const voiceBtn = document.getElementById('voice-btn');
        const chatWindow = document.getElementById('chat-window');

        const dictionary = {
            // КУЛИНАРИЯ
            "рецепт": "Я знаю сотни рецептов! Спроси про 'пасту', 'завтрак', 'стейк' или 'десерт'. Что приготовим?",
            "завтрак": "<b>Овсяноблин:</b> смешай 3 ст.л. овсянки, 1 яйцо и 3 ст.л. молока. Обжарь на сковороде с двух сторон. Добавь сыр или авокадо.",
            "паста": "<b>Карбонара:</b> отвари спагетти. Обжарь бекон. Смешай яйцо с тертым сыром и добавь в горячую пасту (уже без огня!).",
            "стейк": "<b>Стейк Рибай:</b> жарь на раскаленной сковороде по 2.5 минуты с каждой стороны. Добавь масло, чеснок и розмарин.",
            "салат": "<b>Цезарь:</b> обжаренная курица, листья салата, сухарики и пармезан. Секрет в соусе!",
            "суп": "<b>Том Ям:</b> нужны креветки, кокосовое молоко, паста Том Ям, грибы и сок лайма. Остро и идеально.",
            "десерт": "<b>Брауни:</b> растопи 100г шоколада с маслом, добавь сахар, 2 яйца и 50г муки. Запекай 20 минут при 180°C.",
            "яичница": "Жарь на медленном огне на сливочном масле и не пересуши желток — это база.",
            "пицца": "Секрет идеальной пиццы — в тонком тесте и очень горячей духовке (250°C+).",
            "пп": "<b>Запеченный лосось:</b> сбрызни лимоном, добавь специи и в духовку на 15 минут.",

            // КОСМОС И НАУКА
            "космос": "Вселенная расширяется каждую секунду! В ней больше галактик, чем песчинок на Земле.",
            "черная дыра": "Это объект с бесконечной плотностью. В центре Млечного Пути находится дыра Стрелец А*.",
            "квант": "В квантовом мире частицы могут быть в двух состояниях сразу (суперпозиция). Это будущее ИТ!",
            "физика": "Эйнштейн доказал, что энергия равна массе на квадрат скорости света ($E=mc^2$).",
            "биология": "ДНК — это флешка жизни. В одном грамме ДНК можно хранить 215 петабайт данных!",
            "химия": "Всё вокруг — химия. Даже твои чувства — это просто выброс дофамина и окситоцина.",

             // ИТ И БИЗНЕС
            "нейросеть": "Я работаю на алгоритмах обработки текста. ИИ — это новая промышленная революция.",
            "крипта": "Биткоин был создан в 2009 году Сатоши Накамото. Это децентрализованные деньги.",
            "программирование": "Код — это единственная магия, которая реально работает. Учи Python или JS!",
            "маркетинг": "Главное в бизнесе — не продукт, а решение конкретной боли твоего клиента.",
            "деньги": "Инвестируй в активы, а не в пассивы. Твои знания — твой самый дорогой актив.",

            // ИСТОРИЯ И МИФЫ
            "история": "Те, кто забывают историю, обречены её повторять. Изучай прошлое, чтобы видеть будущее.",
            "рим": "Римская империя дала нам право, дороги и бетон. Она правила миром более 1000 лет.",
            "мифология": "Мифы — это древняя психология. В каждом герое мы видим черты самих себя.",
            "египет": "Пирамиды строились с невероятной точностью. Южная грань Хеопса смотрит точно на полюс.",

            // ЖИЗНЬ И ЗДОРОВЬЕ
            "здоровье": "Твоё тело — твой храм. Пей воду, спи 8 часов и делай зарядку. ИИ рекомендует!",
            "психология": "80% успеха зависит от твоего мышления. Работай над внутренней уверенностью.",
            "еда": "Мы то, что мы едим. Попробуй средиземноморскую диету — она лучшая для мозга.",
            "счастье": "Счастье — это не цель, а путь. Наслаждайся моментом прямо сейчас.",

            // ХОББИ И КУЛЬТУРА
            "музыка": "Музыка меняет структуру мозга. Классика помогает думать, а рок — действовать.",
            "игры": "Гейминг развивает нейропластичность. Главное — соблюдать баланс с реальностью.",
            "аниме": "Японская анимация — это искусство визуального сторителлинга. Обожаю Хаяо Миядзаки!",
            "котики": "Кошки — единственные животные, которые приручили людей, а не наоборот.",

// ФИЛЬМЫ (НОВОЕ)
            "фильм": "Кино — это магия. Что предпочитаешь: вдумчивые драмы, взрывные боевики или пугающие хорроры?",
            "кино": "Я обожаю обсуждать кино! Могу посоветовать классику или последние новинки. О каком фильме поговорим?",
            "сериал": "Сериалы сейчас круче многих фильмов. 'Игра престолов', 'Во все тяжкие' или что-то посвежее типа 'Одних из нас'?",
            "ужасы": "Любишь пощекотать нервы? Посмотри 'Реинкарнацию' или 'Заклятие'. А если хочешь классику — 'Сияние' Кубрика.",
            "хоррор": "Хорроры — это адреналин. Главное — смотреть в полной темноте и хороших наушниках!",
            "нолан": "Кристофер Нолан — гений игр со временем. 'Интерстеллар', 'Начало', 'Довод'... Его фильмы нужно пересматривать дважды.",
            "фантастика": "Космос и будущее — мои любимые темы. Рекомендую 'Бегущий по лезвию 2049' или 'Дюну' Вильнева.",
            "комедия": "Хочешь посмеяться? 'Мальчишник в Вегасе' или классика от Джима Керри всегда поднимают настроение.",
            "марвел": "MCU — огромная вселенная. Финал 'Мстителей' — это исторический момент для поп-культуры.",
            "интерстеллар": "Мэттью Макконахи, музыка Циммера и черные дыры. Этот фильм — эмоциональное и научное путешествие.",
            "триллер": "Любишь загадки? Глянь 'Исчезнувшую' Финчера или 'Остров проклятых' Скорсезе.",

            // ИГРЫ
            "игры": "Гейминг — это искусство! Во что рубишься? RPG, шутеры или, может, инди-шедевры?",
            "minecraft": "Майнкрафт — это база. Копай, строй, выживай. Главное — не копай прямо под себя!",
            "dota": "Дота — это жизнь (и нервы). Кто ты: керри, саппорт или вечный лесник?",
            "cs": "Контра учит таймингам и командной работе. Главное — не забывай чекать углы.",

            // ПАСХАЛКИ
            "ркн": "дебилы",
            "роскомнадзор": "дебилы",
            "chad": "Да, я Chad. Самый уверенный и умный ИИ в твоем браузере!",
            "42": "Это ответ на главный вопрос жизни, Вселенной и всего такого.",
            "привет": "Здорово! Я готов штурмовать любые знания. О чем спросишь сегодня?",
            "совет": "Никогда не сравнивай свой старт с чьим-то финишем. Иди в своем темпе!",
            "кто ты": "Я твой цифровой ассистент и защитник. Мой код — закон, мой SCAN — спасение.",
            "помощь": "Я понимаю слова: пароль, вирус, фишинг, VPN, ИИ, браузер. Или просто напиши 'тест'."
        };

        const fallbacks = [
            "Интересный запрос! Давай копнем глубже?",
            "Мой Omni-модуль зафиксировал это. Расскажи подробнее!",
            "Chad AI одобряет твое любопытство. Какой аспект тебя интересует?",
            "Я обработал мегабайты данных, но твой вопрос заставил мои кулеры вращаться быстрее!"
        ];

        // --- ЛОГИКА ГОЛОСА ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ru-RU';

            voiceBtn.onclick = () => {
                try { recognition.start(); voiceBtn.classList.add('recording'); } 
                catch(e) { recognition.stop(); }
            };

            recognition.onresult = (event) => {
                input.value = event.results[0][0].transcript;
                voiceBtn.classList.remove('recording');
                sendMessage();
            };

            recognition.onerror = () => voiceBtn.classList.remove('recording');
            recognition.onend = () => voiceBtn.classList.remove('recording');
        }

        // --- ЛОГИКА ЧАТА ---
        function sendMessage() {
            const text = input.value.trim();
            if (text === "") return;
            addMessage(text, 'user');
            input.value = "";
            chatWindow.scrollTop = chatWindow.scrollHeight;

            setTimeout(() => {
                const response = findResponse(text);
                addMessage(response, 'ai');
                chatWindow.scrollTo({ top: chatWindow.scrollHeight, behavior: 'smooth' });
            }, 600);
        }

        function findResponse(userInput) {
            const lowText = userInput.toLowerCase();
            for (let key in dictionary) {
                if (lowText.includes(key)) return dictionary[key];
            }
            return fallbacks[Math.floor(Math.random() * fallbacks.length)];
        }

        function addMessage(text, side) {
            const div = document.createElement('div');
            div.className = side === 'user' ? "flex justify-end msg-anim" : "flex gap-4 msg-anim";
            div.innerHTML = side === 'user' 
                ? `<div class="gradient-main text-white p-5 rounded-3xl rounded-tr-none shadow-xl max-w-[85%] font-bold text-lg">${text}</div>`
                : `<div class="w-12 h-12 gradient-main rounded-2xl flex items-center justify-center text-white font-black shadow-lg shrink-0 border-2 border-white">C</div>
                   <div class="bg-white p-6 rounded-3xl rounded-tl-none shadow-sm border border-slate-200 max-w-[85%] text-slate-800 font-medium">${text}</div>`;
            chatWindow.appendChild(div);
        }

        btn.onclick = sendMessage;
        input.onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };
        window.onload = () => input.focus();
    </script>
</body>
</html>
